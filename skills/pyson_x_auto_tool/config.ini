[General]
# Xアカウントのユーザーデータディレクトリ
PROFILE_DIR = ~/.prometheus_selenium

# いいね履歴ファイル
LIKED_USERS_FILE = ~/.prometheus_selenium/liked_users.json

# 自動リセット時刻 (時, 24時間表記)
RESET_HOUR = 6

# 自分のXユーザー名（@なし）
MY_USERNAME = Fuj_100mili

# 固定ツイートのステータスID（スキップしたい場合に設定）
# 例: https://x.com/Fuj_100mili/status/1234567890 の場合は 1234567890 を設定
SKIP_PINNED_TWEET_ID = 011928896539935182

[Behavior]
# 全力モード: キーワードに関係なく積極的にいいねする (true/false)
POWERFUL_MODE = true

# いいねアクションの確率 (0-100) - 積極的にいいねするため90に設定
LIKE_PROBABILITY = 90
# プロフィール閲覧アクションの確率 (0-100)
VIEW_PROFILE_PROBABILITY = 5
# スキップアクションの確率 (0-100)
SKIP_PROBABILITY = 5

# アクション間の最小待機時間 (秒)
MIN_ACTION_WAIT = 10
# アクション間の最大待機時間 (秒)
MAX_ACTION_WAIT = 60

# ページスクロール後の待機時間 (秒)
SCROLL_WAIT = 3

[Limits]
# 1日のいいね上限数 - 活動量を増やすため150に設定
DAILY_LIKE_LIMIT = 150
# 1サイクルあたりのいいね目標数 - 1回の実行で多く稼ぐため10に設定
LIKES_PER_CYCLE_TARGET = 10

[Keywords]
# いいね対象キーワード (カンマ区切り)
TARGET_KEYWORDS = FX,為替,ドル円,ユーロ,ポンド,株,日経,投資,トレード,相場,損切り,利確,エントリー,ポジション,チャート,テクニカル,ファンダ

# 除外キーワード (カンマ区切り)
EXCLUDE_KEYWORDS = 無料,プレゼント,LINE,公式,サロン,コンサル,月収,稼ぐ,稼げる,利益確定,爆益,億,万円達成,収益公開,実績公開,プロフ見て,プロフィール見て,固定ツイ,固ツイ,詳細はこちら,気になる方,興味ある方,DMください,DM待ってます,リプください,手法,ノウハウ,教材,講座,セミナー,スクール,配信,シグナル,自動売買,EA,コピトレ,フォロバ,相互,拡散希望,RT希望

[Activity_Hours]
# 活動時間帯 (例: 9-22, 11-24)
ACTIVE_HOURS_WEEKDAY = 9-22
ACTIVE_HOURS_WEEKEND = 11-24

[AI_Evaluation]
# AI評価を無効にする (シンプル版では使用しません)
ENABLE_AI_EVALUATION = False
# AI評価の閾値 (0-100)
AI_SCORE_THRESHOLD = 20

[OpenAI]
# OpenAIモデル名 (シンプル版では使用しません)
OPENAI_MODEL = gpt-4o-mini

[Growth]
# フォロー機能を有効にする (true/false)
ENABLE_FOLLOW = true
# アンフォロー機能を有効にする (true/false)
ENABLE_UNFOLLOW = true

# 1サイクルあたりの最大フォロー数
FOLLOWS_PER_CYCLE = 2
# 1サイクルあたりの最大アンフォロー数
UNFOLLOWS_PER_CYCLE = 5

# フォローアクションの確率 (0-100) - 控えめに20%に設定
FOLLOW_PROBABILITY = 20

# 何日間フォローバックがなければアンフォローするか (日数)
UNFOLLOW_AFTER_DAYS = 7

# 自分のXユーザー名（@なし）
MY_USERNAME = Fuj_100mili

[Likeback]
# 自分のツイートを遡る最大スクロール回数
MAX_TWEET_SCROLLS = 5
# いいね一覧を遡る最大スクロール回数
MAX_LIKER_SCROLLS = 10
